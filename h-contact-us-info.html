<style>
    /* ── CSS variables already defined by h-contact-us-hero block ──
       Redeclared here so this block also works standalone for preview. */
    :root {
        --purple:    #6750A1;
        --purple-dk: #3E2A6E;
        --beige:     #E8D0AA;
        --beige-dk:  #D2B679;
        --white:     #ffffff;
        --dark:      #0E0E0E;
    }

    .contact-info-title {
        font-size: clamp(1.5rem, 3vw, 2.5rem);
        font-weight: 800;
        line-height: 1.1;
        color: var(--white);
        margin-bottom: 2.5rem;
    }
    .contact-info-title span {
        font-style: italic;
        font-family: 'Playfair Display', serif;
        color: var(--beige);
    }

    .info-block {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        margin-bottom: 3rem;
    }

    .info-item {
        display: flex;
        align-items: flex-start;
        gap: 1rem;
    }

    .info-icon {
        width: 40px;
        height: 40px;
        flex-shrink: 0;
        background: rgba(103,80,161,0.15);
        border: 1px solid rgba(103,80,161,0.3);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 2px;
    }
    .info-icon svg { color: var(--beige); width: 18px; height: 18px; }

    .contact-info { text-align: left; }

    .info-text {}
    .info-label {
        font-size: 0.6rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.3);
        margin-bottom: 0.3rem;
    }
    .info-value {
        font-size: 0.88rem;
        color: rgba(255,255,255,0.75);
        line-height: 1.6;
    }
    .info-value a {
        color: rgba(255,255,255,0.75);
        text-decoration: none;
        transition: color 0.2s;
    }
    .info-value a:hover { color: var(--beige); }

    .map-links {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
    }

    .map-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 1.25rem;
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 100px;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: rgba(255,255,255,0.6);
        text-decoration: none;
        transition: border-color 0.25s, color 0.25s, background 0.25s;
    }
    .map-btn:hover {
        border-color: var(--beige);
        color: var(--beige);
        background: rgba(232,208,170,0.06);
    }
    .map-btn svg { width: 14px; height: 14px; }
</style>
